order += "net_rate"
order += "sysdata"
order += "battery_level"
order += "time"

net_rate {
  format = "{interface} {up}/{down}"
  interfaces = "wlp6s0", "enp9s0"
}

sysdata {
  format = "{cpu_usage}% {mem_used_percent}%"
}

battery_level {
  format = "{}"
  mode = "text"
}

time {
  format = "%d/%m/%Y %H:%M"
}
