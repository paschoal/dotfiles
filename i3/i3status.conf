general {
  colors = true
  color_good = "#CCCCCC"
  color_degraded = "#CCCCCC"
  color_bad = "#CCCCCC"
  separator = false
}

order += "wireless wlp6s0"
order += "load"
order += "cpu_usage"
order += "battery 0"
order += "time"

wireless wlp6s0 {
  format_up = " %essid %quality "
  format_down = ""
}

load {
  format = " %1min "
}

cpu_usage {
  format = " %usage "
}

battery 0 {
  format = " %status %percentage %remaining "
  format_down = ""
  last_full_capacity = true
  hide_seconds = true
}

time {
  format = " %A %e %B %H:%M:%S"
}
