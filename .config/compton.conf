#### Shadow
shadow = true;
no-dnd-shadow = true;
no-dock-shadow = true;
clear-shadow = true;

# Soft
shadow-radius = 8;
shadow-offset-x = -10;
shadow-offset-y = 8;
shadow-opacity = 0.2;

shadow-exclude = [
  "class_g = 'Firefox' && argb",
  "class_g = 'slop'",
  "class_g = 'Dunst'",
  "class_g = 'Rofi'",
  "class_g = 'i3-frame'",
  "class_g = 'xtext'"
]

blur-background = false;
blur-background-frame = false;
blur-kern = "3x3box";
opacity-rule = [
  "0:class_g = 'blank'",
  "0:class_g = 'slop'"
];-

#### Fade
fading = true;
fade-in-step = 0.1;
fade-out-step = 0.08;
no-fading-destroyed-argb = true;


#### Others
backend = "glx";
mark-wmwin-focused = true;
mark-ovredir-focused = true;
detect-client-opacity = true;
refresh-rate = 60;
vsync = "none";
dbe = true;
unredir-if-possible = true;
focus-exclude = [
    "class_g = 'Cairo-clock'",
    "class_g = 'slop'"
];
detect-transient = true;
detect-client-leader = true;
invert-color-include = [ ];

glx-no-stencil = true;
glx-swap-method = "undefined";

wintypes:
{
  tooltip = { fade = true; shadow = false; opacity = 0.75; focus = true; };
};
